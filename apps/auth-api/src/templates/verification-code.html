<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Verification Code</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f5f0e8;
        font-family: "Courier New", Courier, monospace;
        padding: 40px 20px;
      }

      .container {
        max-width: 520px;
        margin: 0 auto;
        background-color: #ffffff;
        border: 3px solid #000000;
        box-shadow: 6px 6px 0px #000000;
        padding: 40px 36px;
      }

      .header {
        border-bottom: 3px solid #000000;
        padding-bottom: 20px;
        margin-bottom: 28px;
      }

      .header h1 {
        font-size: 22px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #000000;
      }

      .header p {
        font-size: 12px;
        color: #555555;
        margin-top: 4px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .body-text {
        font-size: 14px;
        color: #222222;
        line-height: 1.6;
        margin-bottom: 28px;
      }

      .code-block {
        background-color: #ffee00;
        border: 3px solid #000000;
        box-shadow: 4px 4px 0px #000000;
        text-align: center;
        padding: 20px;
        margin-bottom: 28px;
      }

      .code-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #000000;
        margin-bottom: 8px;
      }

      .code-value {
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 10px;
        color: #000000;
      }

      .expiry-note {
        font-size: 12px;
        color: #555555;
        text-align: center;
        margin-bottom: 28px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .cta-wrapper {
        text-align: center;
        margin-bottom: 28px;
      }

      .cta-button {
        display: inline-block;
        background-color: #000000;
        color: #ffffff;
        text-decoration: none;
        font-family: "Courier New", Courier, monospace;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        padding: 14px 28px;
        border: 3px solid #000000;
        box-shadow: 4px 4px 0px #555555;
      }

      .footer {
        border-top: 3px solid #000000;
        padding-top: 16px;
        font-size: 11px;
        color: #777777;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Paul - Task Assistant</h1>
        <p>Email Verification</p>
      </div>

      <p class="body-text">
        Use the code below to complete your sign-in. Do not share this code with
        anyone.
      </p>

      <div class="code-block">
        <p class="code-label">Verification Code</p>
        <p class="code-value">{{CODE}}</p>
      </div>

      <p class="expiry-note">
        This code expires in {{EXPIRY_MINUTES}} minutes.
      </p>

      <!-- <div class="cta-wrapper">
        <a href="{{PLATFORM_URL}}" class="cta-button">Access the Platform</a>
      </div> -->

      <div class="footer">
        <p>
          If you did not request this code, you can safely ignore this email.
        </p>
        <p>&copy; Paul - Task Assistant.</p>
      </div>
    </div>
  </body>
</html>
