name: Deploy to Vercel

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy-apps:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    environment: Production
    strategy:
      fail-fast: false
      matrix:
        app: [auth-api, core-api, ai-api, web-ui]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Vercel Project ID
        run: |
          case "${{ matrix.app }}" in
            "auth-api") echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_AUTH_API_PROJECT_ID }}" >> $GITHUB_ENV ;;
            "core-api") echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_CORE_API_PROJECT_ID }}" >> $GITHUB_ENV ;;
            "ai-api")   echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_AI_API_PROJECT_ID }}"   >> $GITHUB_ENV ;;
            "web-ui")   echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_UI_PROJECT_ID }}"       >> $GITHUB_ENV ;;
          esac

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        run: corepack prepare pnpm@10.31.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment
        run: pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}

      - name: Build
        run: pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}

      - name: Deploy
        run: pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/${{ matrix.app }}
